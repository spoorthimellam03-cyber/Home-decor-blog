<!DOCTYPE html>
<html>
<head>
  <title>Home Decor Blog</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f4f4f4;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px;
    }

    .header h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
    }

    /* Blog Card */
    .card {
      background: white;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .card h2 {
      margin: 10px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #222;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    .btn:hover {
      background: #444;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1><i class="fa-solid fa-house"></i> Home Decor Blog</h1>
      <p>Cozy, aesthetic and modern home decor ideas for your space</p>
    </div>

    <!-- Blog Post Card -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
      <h2>5 Cozy Home Decor Ideas for a Warm Home</h2>
      <p>Simple ideas to make your home more aesthetic, cozy, and relaxing without spending too much money.</p>
      <a class="btn" href="post1.html">Read More</a>
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2026 Home Decor Blog | Made with ❤️
    </div>

  </div>

</body>
</html>
